---
- name: Basic CIS Level 1 Mock Configuration
  hosts: all
  become: yes
  tasks:
    - name: Ensure IP forwarding is disabled
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        state: present
        reload: yes

    - name: Ensure permissions on /etc/shadow are configured
      ansible.builtin.file:
        path: /etc/shadow
        owner: root
        group: root
        mode: '0000'

    - name: Ensure suspicious file systems are disabled (cramfs)
      ansible.builtin.copy:
        dest: /etc/modprobe.d/cramfs.conf
        content: "install cramfs /bin/true"
        mode: '0644'
